name: Cleanup

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete everything except database
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name 'database' ! -name '.git' -exec rm -rf {} +

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Cleanup repository" || exit 0
          git push
